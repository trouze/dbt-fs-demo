name: 'dbt_dugout_downstream'
version: '1.0.0'
config-version: 2

profile: 'sa_snowflake'
dbt-cloud:
  defer-env-id: 400397

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
clean-targets:
  - "target"
  - "dbt_packages"

models:
  +freshness:
    build_after:
      count: 4
      period: hour
      updates_on: all
  dbt_dugout:
    +schema: downstream

seeds:
  dbt_dugout:
    +enabled: false

vars:
  # Add any project variables here
  start_date: '2019-01-01'
  end_date: '2023-12-31'

tests:
  +severity: warn
  +store_failures: true