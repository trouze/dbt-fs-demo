name: dbt_dugout{{ var('project_suffix') }}
version: "1.0.0"
config-version: 2

profile: "sa_snowflake"
dbt-cloud:
  defer-env-id: 400397
  project-id: 465676

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_dugout:
    # Staging models
    staging:
      +schema: staging
      +materialized: view

    # Intermediate models
    intermediate:
      +schema: intermediate
      +materialized: view
    # Mart models
    marts:
      +config:
        +group: mart
        +access: public
      +schema: mart
      +materialized: table

seeds:
  dbt_dugout:
    +enabled: false

tests:
  +severity: warn
  +store_failures: true
