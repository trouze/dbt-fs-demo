# Top-level metrics file — cross-model metrics only.
#
# salary_per_home_run, salary_per_win, salary_per_hit were previously defined
# here as cross-table ratio metrics (fct_player_salaries / player_performance_analysis).
# They have been moved to schema.yml on player_performance_analysis using the
# pre-computed cost_per_home_run, cost_per_win, cost_per_hit columns.
#
# Limitation: cross-table ratio metrics require a fan-out join between two
# fact tables at different grains, which MetricFlow supports but Snowflake
# Semantic Views do not (only FK → PK relationships are allowed). Using
# pre-computed cost columns sidesteps this by keeping the metric single-table.

metrics: []
