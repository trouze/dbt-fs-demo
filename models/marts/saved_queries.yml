# Saved queries for the dbt Dugout semantic layer demo.
#
# Dimension reference format (latest spec):
#   Dimension('entity_name__dimension_name')
#   TimeDimension('entity_name__dimension_name', 'granularity')
#
# Entity → model mapping:
#   player_salary   → fct_player_salaries  (primary)
#   player_season   → player_performance_analysis (primary)
#   player          → dim_roster (primary; foreign key in both fact models)

saved_queries:
  # -----------------------------------------------------------------------
  # Payroll by position and season
  # "Where is our salary budget going, and how has it shifted over time?"
  # -----------------------------------------------------------------------
  - name: salary_by_position_and_season
    label: "Salary by Position & Season"
    description: >
      Total and average salary broken down by position and season.
      Shows payroll allocation across positions over time.
    query_params:
      metrics:
        - total_salary_millions
        - average_salary_millions
        - contract_count
      group_by:
        - Dimension('player_salary__position')
        - TimeDimension('player_salary__season_date', 'year')
    exports:
      - name: salary_by_position_and_season
        config:
          export_as: table
          schema: mart

  # -----------------------------------------------------------------------
  # League-level payroll comparison
  # "How does AL vs NL spend compare season over season?"
  # -----------------------------------------------------------------------
  - name: salary_by_league_and_season
    label: "Salary by League & Season"
    description: >
      Total salary and contract count broken down by league and year.
    query_params:
      metrics:
        - total_salary_millions
        - average_salary_millions
        - contract_count
      group_by:
        - Dimension('player_salary__league')
        - TimeDimension('player_salary__season_date', 'year')
    exports:
      - name: salary_by_league_and_season
        config:
          export_as: table
          schema: mart

  # -----------------------------------------------------------------------
  # Pitcher performance by season
  # "How is our rotation performing year over year?"
  # -----------------------------------------------------------------------
  - name: pitcher_performance_by_season
    label: "Pitcher Performance by Season"
    description: >
      Aggregate pitcher wins, saves, strikeouts, ERA, and win/loss ratio
      by season. Useful for spotting rotation quality trends.
    query_params:
      metrics:
        - total_wins
        - total_saves
        - total_strikeouts_pitched
        - average_era
        - win_loss_ratio
      group_by:
        - TimeDimension('player_season__season_date', 'year')
    exports:
      - name: pitcher_performance_by_season
        config:
          export_as: table
          schema: mart

  # -----------------------------------------------------------------------
  # Home run leaders by season
  # "Who are our best power hitters, and what does each HR cost us?"
  # -----------------------------------------------------------------------
  - name: home_run_leaders_by_season
    label: "Home Run Leaders by Season"
    description: >
      Home run totals, RBI, and salary-per-HR per player per season.
      Surfaces the most cost-efficient power hitters.
    query_params:
      metrics:
        - total_home_runs
        - total_rbi
        - salary_per_home_run
      group_by:
        - Dimension('player__full_name')
        - TimeDimension('metric_time', 'year')
    exports:
      - name: home_run_leaders_by_season
        config:
          export_as: table
          schema: mart

  # -----------------------------------------------------------------------
  # Pitcher cost efficiency
  # "Which pitchers give us the best wins per dollar?"
  # -----------------------------------------------------------------------
  - name: pitcher_cost_efficiency
    label: "Pitcher Cost Efficiency"
    description: >
      Wins, ERA, total salary, and salary-per-win per pitcher per season.
      Lower salary_per_win = better cost efficiency.
    query_params:
      metrics:
        - total_wins
        - average_era
        - total_salary_millions
        - salary_per_win
      group_by:
        - Dimension('player__full_name')
        - TimeDimension('metric_time', 'year')
    exports:
      - name: pitcher_cost_efficiency
        config:
          export_as: table
          schema: mart

  # -----------------------------------------------------------------------
  # Batting trends by season
  # "How has offensive production trended over the years?"
  # -----------------------------------------------------------------------
  - name: batting_trends_by_season
    label: "Batting Trends by Season"
    description: >
      League-wide batting production (hits, home runs, RBI, stolen bases, runs)
      and batting average by season. Shows how offensive output has shifted
      year over year.
    query_params:
      metrics:
        - total_hits
        - total_home_runs
        - total_rbi
        - total_stolen_bases
        - total_runs
        - average_batting_average
      group_by:
        - TimeDimension('player_season__season_date', 'year')
    exports:
      - name: batting_trends_by_season
        config:
          export_as: table
          schema: mart

  # -----------------------------------------------------------------------
  # Salary efficiency by season
  # "Are we spending smarter over time?"
  # -----------------------------------------------------------------------
  - name: salary_efficiency_by_season
    label: "Salary Efficiency by Season"
    description: >
      Cost-per-hit, cost-per-home-run, and cost-per-win alongside total payroll
      by season. Rising values indicate declining cost efficiency; lower is better.
    query_params:
      metrics:
        - total_salary_millions
        - salary_per_hit
        - salary_per_home_run
        - salary_per_win
      group_by:
        - TimeDimension('metric_time', 'year')
    exports:
      - name: salary_efficiency_by_season
        config:
          export_as: table
          schema: mart
